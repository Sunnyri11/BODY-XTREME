<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODY XTREME - Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
  
  <style>
    body { font-family: 'Montserrat', sans-serif; }
    
    .fondo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    .fondo img { width: 100%; height: 100%; object-fit: cover; }
    .overlay { background: rgba(0, 0, 0, 0.75); min-height: 100vh; }

    /* Estilos Neón y Cristal */
    .card-login {
      background: rgba(15, 15, 15, 0.95) !important;
      backdrop-filter: blur(15px);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 255, 136, 0.15);
    }
    
    .form-label {
      font-size: 0.9rem;
      letter-spacing: 0.5px;
    }

    /* Inputs y Placeholders legibles */
    .input-custom {
      background: rgba(0, 0, 0, 0.6) !important;
      border: 1px solid #444;
      color: #fff !important;
      padding: 14px 15px;
      border-radius: 12px;
      transition: all 0.3s ease;
    }
    /* Estilo para que el texto de fondo se note */
    .input-custom::placeholder { 
      color: rgba(255, 255, 255, 0.5) !important; 
    }
    .input-custom:focus { 
      border-color: #00ff88; 
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); 
      outline: none;
    }
    
    /* Botón principal */
    .btn-neon {
      background: transparent;
      color: #00ff88;
      border: 2px solid #00ff88;
      border-radius: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
    }
    .btn-neon:hover { 
      background: #00ff88; 
      color: #000; 
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); 
      transform: translateY(-2px);
    }

    /* Botón Volver visible y elegante */
    .btn-back {
      color: #a0a0a0;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-back:hover {
      color: #ffffff;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>

  <div class="fondo">
    <img src="images/fondobienvenida.png" alt="Fondo Gimnasio">
  </div>

  <div class="overlay d-flex align-items-center justify-content-center">
    <div class="container">
      <div class="row justify-content-center w-100 m-0">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4"> 
          
          <div class="card card-login shadow-lg">
            <div class="card-header text-center border-bottom pb-4 pt-4 border-secondary bg-transparent">
              <div class="d-inline-block p-3 rounded-circle mb-3" style="background: rgba(0, 255, 136, 0.1);">
                <i class="bi bi-person-circle fs-1" style="color: #00ff88;"></i>
              </div>
              <h3 class="text-uppercase m-0" style="color: #00ff88; font-weight: 900; letter-spacing: 1px;">Inicio de Sesión</h3>
              <p class="text-white-50 small m-0 mt-2">Sistema de Gestión Body Xtreme</p>
            </div>
            
            <div class="card-body p-4 p-md-5 pt-4">
              <div id="contenedor-alertas"></div>

              <form id="form-login">
                <div class="mb-4">
                  <label class="form-label text-white-50 fw-bold"><i class="bi bi-envelope me-2"></i>Correo Electrónico</label>
                  <input type="email" class="form-control input-custom" id="email" required placeholder="ejemplo@gym.com">
                </div>

                <div class="mb-5">
                  <label class="form-label text-white-50 fw-bold"><i class="bi bi-lock me-2"></i>Contraseña</label>
                  <input type="password" class="form-control input-custom" id="password" required placeholder="••••••••">
                </div>

                <div class="d-grid gap-3 text-center">
                  <button type="submit" class="btn btn-neon py-3" id="btn-ingresar">
                    <span id="btn-texto">Ingresar</span>
                    <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                  </button>
                  
                  <a href="index.html" class="btn-back mt-2">
                    <i class="bi bi-arrow-left me-1"></i> Volver al Inicio
                  </a>
                </div>
              </form>
            </div>
          </div> 
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script src="js/login.js"></script>

  <script>
    // Mostrar el mensaje cuando el login es correcto
    function mostrarMensajeAcceso() {
        const contenedor = document.getElementById('contenedor-alertas');
        contenedor.innerHTML = `
            <div class="alert alert-success text-center fw-bold animate__animated animate__fadeIn py-2 mb-4" style="background: rgba(0, 255, 136, 0.2); border: 1px solid #00ff88; color: #00ff88;">
                <i class="bi bi-check-circle-fill me-2"></i> ACCESO CONCEDIDO
            </div>
        `;
    }
  </script>
</body>
</html>
