<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODY XTREME - Mi Perfil Staff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">

    <style>
        body { font-family: 'Montserrat', sans-serif; }
        
        .fondo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .fondo img { width: 100%; height: 100%; object-fit: cover; }
        .overlay { background: rgba(0, 0, 0, 0.75); min-height: 100vh; display: flex; flex-direction: column; }

        /* Contenedores */
        .card-custom {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 20px;
            padding: 35px;
            margin-top: 50px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9);
        }
        
        .card-info-top {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            height: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card-info-top:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 255, 136, 0.5);
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.15);
        }

        .text-neon-highlight { color: #00ff88 !important; font-weight: 700; }

        /* Botón de Actualizar */
        .btn-update-profile {
            background: transparent;
            color: #00ff88;
            border: 2px solid #00ff88;
            border-radius: 12px;
            font-weight: 900;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .btn-update-profile:hover {
            background: #00ff88;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            transform: translateY(-2px);
        }

        .btn-back {
            color: #a0a0a0;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-back:hover { color: #ffffff; text-shadow: 0 0 8px rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body>

    <div class="fondo">
        <img src="/images/fondoPersonal.png" alt="Fondo Gimnasio">
    </div>

    <div class="overlay">
        <div class="container-fluid px-4 px-lg-5 flex-grow-1 d-flex align-items-center justify-content-center">
            <div class="row justify-content-center w-100">
                <div class="col-xl-9 col-lg-10">

                    <div class="card-custom position-relative">
                        <a href="indexPersonal.html" class="btn-back position-absolute top-0 start-0 m-4">
                            <i class="bi bi-arrow-left me-1"></i> Volver al Panel
                        </a>

                        <div class="text-center mb-5 mt-4 border-bottom pb-4 border-secondary">
                            <div class="d-inline-block p-3 rounded-circle mb-3" style="background: rgba(0, 255, 136, 0.1);">
                                <i class="bi bi-person-badge fs-1" style="color: #00ff88;"></i>
                            </div>
                            <h2 class="fw-bold m-0 text-uppercase" style="color: #ffffff; letter-spacing: 1px;">
                                PERFIL DE <span style="color: #00ff88;">STAFF</span>
                            </h2>
                            <h4 class="text-white mt-3 fw-bold" id="info-nombre">Cargando...</h4>
                        </div>

                        <div class="row g-4 mb-5">
                            
                            <div class="col-md-6">
                                <div class="card-info-top" style="border-bottom: 3px solid #00ff88;">
                                    <div class="d-flex align-items-center mb-4">
                                        <i class="bi bi-person-vcard fs-3 text-neon-highlight me-3"></i>
                                        <h5 class="text-white m-0 fw-bold text-uppercase">Datos Personales</h5>
                                    </div>
                                    <div class="mb-3">
                                        <p class="text-white-50 small mb-1 text-uppercase fw-bold">Celular</p>
                                        <p class="text-white fs-5 m-0 fw-bold" id="info-telefono">...</p>
                                    </div>
                                    <div>
                                        <p class="text-white-50 small mb-1 text-uppercase fw-bold">Correo Electrónico</p>
                                        <p class="text-neon-highlight m-0 fs-6 text-truncate" id="info-correo">...</p>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card-info-top">
                                    <div class="d-flex align-items-center mb-4">
                                        <i class="bi bi-briefcase fs-3 text-white-50 me-3"></i>
                                        <h5 class="text-white m-0 fw-bold text-uppercase">Información Laboral</h5>
                                    </div>
                                    <div class="row">
                                        <div class="col-6 mb-3">
                                            <p class="text-white-50 small mb-1 text-uppercase fw-bold">Cargo</p>
                                            <p class="badge bg-secondary fs-6 m-0" id="info-cargos">...</p>
                                        </div>
                                        <div class="col-6 mb-3">
                                            <p class="text-white-50 small mb-1 text-uppercase fw-bold">Turno</p>
                                            <p class="badge text-dark fs-6 m-0" style="background: #00ff88;" id="info-turnos">...</p>
                                        </div>
                                        <div class="col-12 mt-2">
                                            <p class="text-white-50 small mb-1 text-uppercase fw-bold">Sueldo Base</p>
                                            <h3 class="text-white m-0 fw-bold" id="info-sueldo">...</h3>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>

                        <div class="text-center mt-2">
                            <a href="editPersonal.html" class="btn btn-update-profile w-100 py-3 text-uppercase">
                                <i class="bi bi-pencil-square me-2"></i> Actualizar Mis Datos
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/perfilPersonal.js"></script>
</body>
</html>
