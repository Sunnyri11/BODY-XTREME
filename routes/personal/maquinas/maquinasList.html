<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODY XTREME - Inventario de Maquinarias</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/estilos.css">

  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: #fff; margin: 0; overflow-x: hidden; }
    
    /* Fondo Premium */
    .fondo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    .fondo img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
    .overlay { position: relative; z-index: 1; min-height: 100vh; background: rgba(10, 10, 10, 0.85); display: flex; flex-direction: column; }

    /* Sidebar Estandarizado */
    .sidebar { position: fixed; top: 0; left: -300px; width: 300px; height: 100vh; background: linear-gradient(180deg, #050505 0%, #0a1f12 100%); color: #fff; transition: all 0.3s ease-in-out; z-index: 1100; border-right: 2px solid #00ff88; display: flex; flex-direction: column; padding-top: 20px; }
    .sidebar.active { left: 0; }
    #menu-roles-container { flex-grow: 1; overflow-y: auto; margin-top: 15px; }
    .sidebar a { display: flex; align-items: center; padding: 16px 25px; color: #e0e0e0; text-decoration: none; font-size: 1rem; font-weight: 600; transition: all 0.2s; border-left: 4px solid transparent; }
    .sidebar a:hover { background: rgba(0, 255, 136, 0.1); color: #00ff88; border-left: 4px solid #00ff88; padding-left: 30px; }
    #closeSidebar { font-size: 24px; color: #fff; cursor: pointer; align-self: flex-end; margin-right: 20px; transition: 0.3s; text-decoration: none; }
    #closeSidebar:hover { color: #dc3545; transform: scale(1.1); }
    .logout { padding: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); }

    /* Header y Botón Hamburguesa */
    header { background: rgba(10, 10, 10, 0.85); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(0, 255, 136, 0.3); }
    .hamburger { font-size: 26px; cursor: pointer; color: #000; background: #00ff88; border-radius: 8px; padding: 5px 12px; transition: 0.3s; }
    .hamburger:hover { transform: scale(1.05); }
    .logo-header { font-weight: 900; font-size: 1.5rem; font-style: italic; color: #ffffff; margin: 0; }
    .text-neon { color: #00ff88; }

    /* Contenedores y Dashboard */
    .card-custom { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(0, 255, 136, 0.2); border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9); }
    .titulo-moderno { font-size: 2rem; font-weight: 900; text-transform: uppercase; color: #ffffff; }

    /* Buscador Contrastado */
    .search-input-custom { background: rgba(255, 255, 255, 0.95) !important; border: 2px solid #444 !important; color: #000 !important; padding: 12px 15px; border-radius: 12px; font-weight: 600; }
    .search-input-custom::placeholder { color: #555 !important; font-weight: 400; }

    /* Tablas */
    .table-custom thead th { background-color: #0a0a0a !important; color: #00ff88 !important; border-bottom: 2px solid #00ff88 !important; text-transform: uppercase; font-size: 0.85rem; padding: 15px; }
    .table-custom tbody tr:hover { background-color: rgba(0, 255, 136, 0.05) !important; }

    /* Botones de Acción (Consistentes) */
    .btn-registrar-destacado { background-color: #00ff88; color: #000; border: none; font-weight: 900; padding: 10px 25px; border-radius: 10px; text-transform: uppercase; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); text-decoration: none; }
    .btn-registrar-destacado:hover { background-color: #fff; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5); color: #000; }
    
    .btn-actualizar { background: #ffc107; color: #000; border: none; font-weight: 700; padding: 6px 12px; font-size: 12px; border-radius: 6px; transition: 0.3s; text-decoration: none; }
    .btn-actualizar:hover { background: #e0a800; transform: scale(1.05); color: #000; }
    
    .btn-eliminar { background: #dc3545; color: #fff; border: none; font-weight: 700; padding: 6px 12px; font-size: 12px; border-radius: 6px; transition: 0.3s; }
    .btn-eliminar:hover { background: #c82333; transform: scale(1.05); }

    /* Paginación Oscura */
    .pagination .page-link { background-color: #111; border-color: rgba(255, 255, 255, 0.1); color: #fff; font-weight: 600; transition: 0.3s; }
    .pagination .page-link:hover { background-color: rgba(0, 255, 136, 0.1); color: #00ff88; }
    .pagination .page-item.active .page-link { background-color: #00ff88; border-color: #00ff88; color: #000; }
    .pagination .page-item.disabled .page-link { background-color: #050505; color: #555; }
  </style>
</head>

<body>

  <div class="fondo">
    <img src="/images/fondo.jpg" alt="Fondo Gimnasio">
  </div>

  <div class="overlay">

    <header>
      <div class="d-flex align-items-center gap-3">
        <div class="hamburger" id="hamburger"><i class="bi bi-list"></i></div>
        <h2 class="logo-header">BODY <span class="text-neon">XTREME</span></h2>
      </div>
      <div class="user-info d-flex align-items-center gap-3">
        <div class="text-end d-none d-md-block">
          <span class="d-block fw-bold" id="nombre-usuario">Cargando...</span>
        </div>
        <img src="/images/usuario.png" alt="Usuario" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00ff88; object-fit: cover;">
      </div>
    </header>

    <div class="sidebar" id="sidebar">
      <a href="#" class="close-btn" id="closeSidebar"><i class="bi bi-x-lg"></i></a>
      <div class="px-4 text-center border-bottom pb-3 mb-2 border-secondary text-neon fw-bold">STAFF PANEL</div>
      <div id="menu-roles-container"></div>
      <div class="logout">
        <button id="btn-logout" class="btn btn-outline-danger w-100 fw-bold"><i class="bi bi-box-arrow-left me-2"></i>Cerrar Sesión</button>
      </div>
    </div>

    <div class="container-fluid px-4 mt-4 mb-5 flex-grow-1">
      <div id="alert-container"></div>

      <div class="card-custom">
        
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3 border-bottom border-secondary pb-3">
          <h2 class="titulo-moderno m-0"><i class="bi bi-gear-wide-connected text-neon me-2"></i>Control de <span class="text-neon">Maquinarias</span></h2>
          <a href="registrar_maquina.html" class="btn btn-registrar-destacado"><i class="bi bi-plus-lg me-2"></i>Registrar Máquina</a>
        </div>

        <div class="row mb-4">
          <div class="col-12 col-md-6 col-lg-4">
            <input type="text" id="buscador-maquinas" class="form-control search-input-custom" placeholder="🔍 Buscar por ID o Nombre...">
          </div>
        </div>

        <div class="table-responsive border border-secondary border-opacity-25 rounded">
          <table class="table table-dark table-custom text-center align-middle mb-0">
            <thead>
              <tr>
                <th width="10%">ID</th>
                <th width="20%">Nombre Equipo</th>
                <th width="15%">Categoría</th>
                <th width="10%">Cantidad</th>
                <th width="15%">Estado</th>
                <th width="15%">Adquisición</th>
                <th width="15%">Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-maquinas-body">
              <tr><td colspan="7" class="py-4 text-white-50">Cargando inventario...</td></tr>
            </tbody>
          </table>
        </div>
        
        <div class="d-flex justify-content-center mt-4" id="paginacion-maquinas"></div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_MAQUINAS_URL = "http://127.0.0.1:8000/api/personal/maquinas";
    let cacheMaquinas = [];
    let filtradas = [];
    let pagina = 1;
    const POR_PAGINA = 8;

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('nombre-usuario').textContent = localStorage.getItem('usuario_nombre') || 'Staff';
      document.getElementById('menu-roles-container').innerHTML = `
        <a href="/routes/personal/indexPersonal.html"><i class="bi bi-house-door me-2"></i> Inicio</a>
        <a href="/routes/personal/clientes/clientesList.html"><i class="bi bi-people me-2"></i> Clientes</a>
        <a href="/routes/personal/entrenadores/entrenadoresList.html"><i class="bi bi-person-vcard me-2"></i> Entrenadores</a>
        <a href="/routes/personal/membresia/membresiaList.html"><i class="bi bi-card-checklist me-2"></i> Membresías</a>
        <a href="/routes/personal/maquinas/maquinasList.html" style="color: #00ff88; border-left: 4px solid #00ff88; background: rgba(0,255,136,0.1);"><i class="bi bi-tools me-2"></i> Maquinaria</a>
        <a href="/routes/personal/horarios/horarioclaseList.html"><i class="bi bi-calendar-week me-2"></i> Horarios/Clases</a>
      `;
      cargarDatos();
      document.getElementById('buscador-maquinas').addEventListener('input', filtrar);
      document.getElementById('hamburger').onclick = () => document.getElementById('sidebar').classList.add('active');
      document.getElementById('closeSidebar').onclick = (e) => { e.preventDefault(); document.getElementById('sidebar').classList.remove('active'); };
      document.getElementById('btn-logout').onclick = () => { localStorage.clear(); window.location.href = "/index.html"; };
    });

    async function cargarDatos() {
      try {
        const res = await fetch(API_MAQUINAS_URL, { headers: { 'Authorization': `Bearer ${localStorage.getItem('toke_usuario')}` } });
        if(!res.ok) throw new Error("Fallo al conectar.");
        cacheMaquinas = await res.json();
        filtradas = [...cacheMaquinas];
        renderizar();
      } catch (err) {
        document.getElementById('tabla-maquinas-body').innerHTML = `<tr><td colspan="7" class="py-4 text-danger fw-bold">Error de conexión al cargar el listado.</td></tr>`;
      }
    }

    function filtrar() {
      const q = document.getElementById('buscador-maquinas').value.toLowerCase();
      filtradas = cacheMaquinas.filter(m => String(m.id_Maquinaria_Gimnasio).includes(q) || m.Nombre.toLowerCase().includes(q));
      pagina = 1;
      renderizar();
    }

    function renderizar() {
      const tbody = document.getElementById('tabla-maquinas-body');
      
      if(filtradas.length === 0) {
          tbody.innerHTML = `<tr><td colspan="7" class="py-4 text-white-50">No se encontraron maquinarias.</td></tr>`;
          document.getElementById('paginacion-maquinas').innerHTML = '';
          return;
      }

      const start = (pagina - 1) * POR_PAGINA;
      const paginadas = filtradas.slice(start, start + POR_PAGINA);

      tbody.innerHTML = paginadas.map(m => `
        <tr>
          <td class="text-success fw-bold">#${m.id_Maquinaria_Gimnasio}</td>
          <td class="text-start ps-3 fw-bold">${m.Nombre}</td>
          <td class="text-white-50">${m.tiposmaquina?.Tipo || '---'}</td>
          <td><span class="badge bg-dark border border-success text-success px-3 py-2">${m.Cantidad} Uds.</span></td>
          <td><span class="badge ${m.estadosmaquina?.Estado === 'Activo' ? 'bg-success' : 'bg-warning text-dark'} px-2 py-1">${m.estadosmaquina?.Estado || '---'}</span></td>
          <td class="text-white-50">${m.Fecha_Adquisición?.substring(0, 10) || '---'}</td>
          <td>
            <div class="d-flex gap-2 justify-content-center">
              <button class="btn-actualizar" onclick="location.href='actualizar_maquina.html?id=${m.id_Maquinaria_Gimnasio}'"><i class="bi bi-pencil-square"></i> Actualizar</button>
              <button class="btn-eliminar" onclick="eliminar(${m.id_Maquinaria_Gimnasio})"><i class="bi bi-trash-fill"></i> Eliminar</button>
            </div>
          </td>
        </tr>
      `).join('');
      renderPaginador();
    }

    function renderPaginador() {
      const total = Math.ceil(filtradas.length / POR_PAGINA);
      if (total <= 1) {
          document.getElementById('paginacion-maquinas').innerHTML = '';
          return;
      }

      let html = `<ul class="pagination pagination-sm mb-0 shadow-sm">
          <li class="page-item ${pagina === 1 ? 'disabled' : ''}">
             <a class="page-link" href="#" onclick="cambiarPagina(${pagina - 1}); return false;">«</a>
          </li>`;
          
      for (let i = 1; i <= total; i++) {
          html += `
          <li class="page-item ${pagina === i ? 'active' : ''}">
             <a class="page-link" href="#" onclick="cambiarPagina(${i}); return false;">${i}</a>
          </li>`;
      }

      html += `
          <li class="page-item ${pagina === total ? 'disabled' : ''}">
             <a class="page-link" href="#" onclick="cambiarPagina(${pagina + 1}); return false;">»</a>
          </li>
      </ul>`;
      
      document.getElementById('paginacion-maquinas').innerHTML = html;
    }

    window.cambiarPagina = (p) => { 
        if(p < 1 || p > Math.ceil(filtradas.length / POR_PAGINA)) return;
        pagina = p; 
        renderizar(); 
    };

    async function eliminar(id) {
      if (!confirm(`¿Eliminar definitivamente la máquina #${id}?`)) return;
      try {
          const res = await fetch(`${API_MAQUINAS_URL}/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${localStorage.getItem('toke_usuario')}` } });
          if(res.ok){
              alert("Máquina eliminada correctamente");
              cargarDatos();
          } else {
              alert("No se pudo eliminar por restricciones de BD.");
          }
      } catch(e) {
          alert("Error de conexión al eliminar.");
      }
    }
  </script>
</body>
</html>
