<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODY XTREME - Editar Maquinaria</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/estilos.css">

  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: #fff; margin: 0; overflow-x: hidden; }
    
    .fondo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    .fondo img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
    .overlay { background: rgba(0, 0, 0, 0.8); min-height: 100vh; }

    /* Estilo del Formulario Premium (Edición = Ámbar) */
    .card-custom-form {
      background: rgba(15, 15, 15, 0.95);
      backdrop-filter: blur(15px);
      border: 1px solid #f1c40f; 
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(241, 196, 15, 0.1);
    }
    .form-label { color: #f1c40f; font-weight: 600; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 0.3rem; }
    
    .input-custom {
      background: rgba(0, 0, 0, 0.5) !important;
      border: 1px solid #444;
      color: #fff !important;
      padding: 12px 15px;
      border-radius: 12px;
      transition: all 0.3s ease;
    }
    .input-custom:focus { border-color: #f1c40f; box-shadow: 0 0 12px rgba(241, 196, 15, 0.3); outline: none; }
    select.input-custom option { background: #1a1a1a; color: #fff; }
    .input-custom::placeholder { color: rgba(255, 255, 255, 0.3) !important; }
    
    /* Botones */
    .btn-update { background: #f1c40f; color: #000; border: none; font-weight: 900; transition: all 0.3s ease; border-radius: 12px; padding: 12px 25px; }
    .btn-update:hover { background: #d4ac0d; box-shadow: 0 0 20px rgba(241, 196, 15, 0.5); transform: translateY(-2px); color: #000; }
    
    .btn-cancel { border: 1px solid #6c757d; color: #ffffff; background: transparent; border-radius: 12px; padding: 12px 25px; transition: all 0.3s; font-weight: 600; }
    .btn-cancel:hover { background: #dc3545; border-color: #dc3545; color: white; transform: translateY(-2px); }

    /* Modal */
    .modal-content-dark { background: rgba(15, 15, 15, 0.98) !important; backdrop-filter: blur(20px); border: 1px solid #f1c40f !important; border-radius: 16px; }
  </style>
</head>
<body>

  <div class="fondo">
    <img src="/images/zona-pesas.jpg" alt="Zona de Pesas">
  </div>

  <div class="overlay d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

          <div id="alert-container"></div>

          <div class="card-custom-form">
            <div class="text-center mb-4 border-bottom pb-3 border-secondary">
              <div class="d-inline-block p-2 rounded-circle mb-2" style="background: rgba(241, 196, 15, 0.1);">
                <i class="bi bi-gear-wide-connected fs-2" style="color: #f1c40f;"></i>
              </div>
              <h3 class="fw-bold m-0 text-white text-uppercase">
                Editar <span style="color: #f1c40f;">Maquinaria</span>
              </h3>
              <p class="text-white-50 small m-0 mt-1" id="info-id-maquina">Sincronizando ID de equipo...</p>
            </div>

            <form id="form-actualizar-maquina">
              
              <div class="mb-4">
                <label for="nombre" class="form-label"><i class="bi bi-tag me-2"></i>Nombre de Maquinaria</label>
                <input type="text" id="nombre" class="form-control input-custom" required placeholder="Cargando...">
              </div>

              <div class="mb-4">
                <label for="id_tipo_maquina" class="form-label"><i class="bi bi-grid-3x3-gap me-2"></i>Tipo / Categoría</label>
                <div class="input-group">
                  <select id="id_tipo_maquina" class="form-select input-custom" required>
                    <option value="" disabled selected>Cargando categorías...</option>
                  </select>
                  <button class="btn btn-outline-warning fw-bold" type="button" data-bs-toggle="modal" data-bs-target="#modalNuevoTipo">
                    <i class="bi bi-plus-lg"></i>
                  </button>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-4">
                  <label for="cantidad" class="form-label"><i class="bi bi-123 me-2"></i>Cantidad</label>
                  <input type="number" id="cantidad" class="form-control input-custom" min="0" required placeholder="0">
                </div>
                <div class="col-md-6 mb-4">
                  <label for="id_estado_maquina" class="form-label"><i class="bi bi-activity me-2"></i>Estado</label>
                  <select id="id_estado_maquina" class="form-select input-custom" required>
                    <option value="" disabled selected>Cargando estados...</option>
                  </select>
                </div>
              </div>

              <div class="mb-5">
                <label for="fecha_adquisicion" class="form-label"><i class="bi bi-calendar-date me-2"></i>Fecha de Adquisición</label>
                <input type="date" id="fecha_adquisicion" class="form-control input-custom" required>
              </div>

              <div class="d-flex gap-3 pt-3 border-top border-secondary">
                <button type="submit" id="btn-guardar" class="btn btn-update px-4 py-2 text-uppercase w-100">Guardar Cambios</button>
                <a href="/routes/personal/maquinas/maquinasList.html" class="btn btn-cancel w-50 text-uppercase text-center text-decoration-none">Cancelar</a>
              </div>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalNuevoTipo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content modal-content-dark">
        <div class="modal-header border-bottom border-warning">
          <h5 class="modal-title fw-bold text-warning"><i class="bi bi-plus-circle me-2"></i> AGREGAR CATEGORÍA</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <form id="form-nuevo-tipo">
          <div class="modal-body">
            <div id="modal-alert-container"></div>
            <div class="mb-3">
              <label for="nuevo_tipo_nombre" class="form-label text-warning">Nombre del Tipo de Máquina</label>
              <input type="text" id="nuevo_tipo_nombre" class="form-control input-custom" placeholder="Ej: Zona de Cardio" required>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary fw-bold" data-bs-dismiss="modal">Cerrar</button>
            <button type="submit" id="btn-guardar-tipo" class="btn btn-warning fw-bold text-dark">GUARDAR TIPO</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const maquinaId = urlParams.get('id');
    const API_BASE_URL = `http://127.0.0.1:8000/api/personal/maquinas`;
    const API_TIPOS_URL = "http://127.0.0.1:8000/api/personal/tiposmaquinas";
    const API_ESTADOS_URL = "http://127.0.0.1:8000/api/personal/estadosmaquinas";

    const token = localStorage.getItem('toke_usuario');
    const rol = localStorage.getItem('usuario_rol');

    const formMaquina = document.getElementById('form-actualizar-maquina');
    const formTipo = document.getElementById('form-nuevo-tipo');
    const selectTipo = document.getElementById('id_tipo_maquina');
    const selectEstado = document.getElementById('id_estado_maquina');
    const btnGuardar = document.getElementById('btn-guardar');
    const btnGuardarTipo = document.getElementById('btn-guardar-tipo');
    const alertContainer = document.getElementById('alert-container');
    const modalAlertContainer = document.getElementById('modal-alert-container');

    if (!token || (rol !== 'personal' && rol !== 'Administrador')) {
        window.location.href = "/login.html";
    }
    if (!maquinaId) {
        alert("Falta el identificador del equipo para procesar la edición.");
        window.location.href = "/routes/personal/maquinas/maquinasList.html";
    }

    function getAuthHeaders() { return { 'Content-Type': 'application/json', 'Accept': 'application/json', 'Authorization': `Bearer ${token}` }; }

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('info-id-maquina').textContent = `Modificando Registro Único: #${maquinaId}`;
        await inicializarFormulario();
    });

    async function inicializarFormulario() {
        try {
            const [resTipos, resEstados] = await Promise.all([
                fetch(API_TIPOS_URL, { headers: getAuthHeaders() }),
                fetch(API_ESTADOS_URL, { headers: getAuthHeaders() })
            ]);

            if (!resTipos.ok || !resEstados.ok) throw new Error("Fallo al descargar catálogos de soporte.");

            const tipos = await resTipos.json();
            const estados = await resEstados.json();

            cargarSelectorTipos(tipos);
            selectEstado.innerHTML = "";
            estados.forEach(e => selectEstado.innerHTML += `<option value="${e.id_EstadoMaquina}">${e.Estado}</option>`);

            const resMaquina = await fetch(`${API_BASE_URL}/${maquinaId}`, { method: 'GET', headers: getAuthHeaders() });
            if (!resMaquina.ok) throw new Error("No se pudo localizar el equipo.");

            const maquina = await resMaquina.json();

            document.getElementById('nombre').value = maquina.Nombre;
            document.getElementById('cantidad').value = maquina.Cantidad;
            selectTipo.value = maquina.id_TipoMaquina;
            selectEstado.value = maquina.id_EstadoMaquina;
            if (maquina.Fecha_Adquisición) {
                document.getElementById('fecha_adquisicion').value = maquina.Fecha_Adquisición.substring(0, 10);
            }

        } catch (error) {
            mostrarAlerta(`Error al inicializar datos: ${error.message}`, "danger");
            btnGuardar.disabled = true;
        }
    }

    function cargarSelectorTipos(listaTipos) {
        selectTipo.innerHTML = '<option value="" disabled>-- Elige una Categoría --</option>';
        listaTipos.forEach(t => { selectTipo.innerHTML += `<option value="${t.id_TipoMaquina}">${t.Tipo}</option>`; });
    }

    formTipo.addEventListener('submit', async (e) => {
        e.preventDefault();
        btnGuardarTipo.disabled = true;
        const payloadTipo = { "Tipo": document.getElementById('nuevo_tipo_nombre').value.trim() };

        try {
            const response = await fetch(API_TIPOS_URL, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(payloadTipo)
            });
            const resData = await response.json().catch(() => ({}));

            if (response.ok || response.status === 201) {
                formTipo.reset();
                modalAlertContainer.innerHTML = "";
                bootstrap.Modal.getInstance(document.getElementById('modalNuevoTipo')).hide();

                const nuevoId = resData.id_TipoMaquina || null;
                try {
                    const resTipos = await fetch(API_TIPOS_URL, { headers: getAuthHeaders() });
                    const tipos = await resTipos.json();
                    cargarSelectorTipos(tipos);
                    if(nuevoId) selectTipo.value = nuevoId;
                } catch(e) { await inicializarFormulario(); }

                mostrarAlerta("¡Nueva categoría guardada e integrada con éxito!", "success");
            } else { throw new Error(resData.message || "La base de datos rechazó la nueva categoría."); }
        } catch (error) {
            modalAlertContainer.innerHTML = `<div class="alert alert-danger fw-bold small py-2 mb-0"> Error: ${error.message}</div>`;
        } finally { btnGuardarTipo.disabled = false; }
    });

    formMaquina.addEventListener('submit', async (e) => {
        e.preventDefault();
        btnGuardar.disabled = true;
        btnGuardar.textContent = "Sincronizando Cambios...";

        const fechaInput = document.getElementById('fecha_adquisicion').value;
        const payload = {
            "Nombre": document.getElementById('nombre').value.trim(),
            "id_TipoMaquina": parseInt(selectTipo.value),
            "Cantidad": parseInt(document.getElementById('cantidad').value),
            "id_EstadoMaquina": parseInt(selectEstado.value),
            "Fecha_Adquisición": `${fechaInput} 00:00:00`
        };

        try {
            const response = await fetch(`${API_BASE_URL}/${maquinaId}`, {
                method: 'PUT',
                headers: getAuthHeaders(),
                body: JSON.stringify(payload)
            });
            const jsonResponse = await response.json().catch(() => ({}));

            if (response.ok) {
                mostrarAlerta("¡Información de la maquinaria actualizada con éxito!", "success");
                setTimeout(() => { window.location.href = "/routes/personal/maquinas/maquinasList.html"; }, 1800);
            } else {
                let msgError = jsonResponse.message || "Error al procesar la actualización del equipo.";
                if (jsonResponse.errors) msgError = Object.values(jsonResponse.errors).flat().join("<br>");
                throw new Error(msgError);
            }
        } catch (error) {
            mostrarAlerta(`⚠️ Error en la transacción: ${error.message}`, "danger");
            btnGuardar.disabled = false;
            btnGuardar.textContent = "Guardar Cambios";
        }
    });

    function mostrarAlerta(mensaje, tipo) {
        alertContainer.innerHTML = `<div class="alert alert-${tipo} alert-dismissible fade show fw-bold text-center" role="alert"><div>${mensaje}</div><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
