<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODY XTREME - Actualizar Datos Staff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">

    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .fondo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .fondo img { width: 100%; height: 100%; object-fit: cover; }
        .overlay { background: rgba(0, 0, 0, 0.75); min-height: 100vh; }

        .card-custom-form {
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.1);
        }

        .form-label {
            color: #00ff88;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }

        .input-custom {
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid #444;
            color: #fff !important;
            padding: 10px 15px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .input-custom:focus { border-color: #00ff88; box-shadow: 0 0 12px rgba(0, 255, 136, 0.3); outline: none; }
        .input-custom::placeholder { color: rgba(255,255,255,0.3) !important; }

        .btn-update {
            background: #029633; color: #ffffff; border: 2px solid #029633; border-radius: 12px; font-weight: 900; transition: all 0.3s ease;
        }
        .btn-update:hover { background: #027a29; border-color: #027a29; color: #ffffff; transform: translateY(-2px); box-shadow: 0 0 20px rgba(2, 150, 51, 0.5); }
        
        .btn-cancel { border: 1px solid #6c757d; color: #ffffff; background: transparent; border-radius: 12px; transition: all 0.3s; }
        .btn-cancel:hover { background: #dc3545; border-color: #dc3545; color: white; transform: translateY(-2px); box-shadow: 0 0 15px rgba(220, 53, 69, 0.5); }
    </style>
</head>
<body>

    <div class="fondo">
        <img src="/images/fondo.jpg" alt="Fondo">
    </div>

    <div class="overlay d-flex align-items-center justify-content-center py-3">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8 col-xl-7"> 
                    
                    <div class="card-custom-form p-4">
                        <div class="text-center mb-3 border-bottom pb-3 border-secondary">
                            <div class="d-inline-block p-2 rounded-circle mb-2" style="background: rgba(0, 255, 136, 0.1);">
                                <i class="bi bi-shield-lock fs-2" style="color: #00ff88;"></i>
                            </div>
                            <h4 class="fw-bold m-0 text-uppercase" style="color: #ffffff; letter-spacing: 1px;">
                                Perfil del <span style="color: #00ff88;">Personal</span>
                            </h4>
                        </div>
                        
                        <div class="alert alert-danger d-none fw-bold py-2" id="alert-error-edit"></div>
                        <div class="alert alert-success d-none fw-bold py-2" id="alert-success-edit"></div>

                        <form id="form-actualizar-staff">                                
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><i class="bi bi-person me-2"></i>Nombre</label>
                                    <input type="text" class="form-control input-custom" id="edit-nombre" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><i class="bi bi-person-lines-fill me-2"></i>Apellido Paterno</label>
                                    <input type="text" class="form-control input-custom" id="edit-paterno" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><i class="bi bi-person-lines-fill me-2"></i>Apellido Materno</label>
                                    <input type="text" class="form-control input-custom" id="edit-materno" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><i class="bi bi-phone me-2"></i>Teléfono</label>
                                    <input type="number" class="form-control input-custom" id="edit-telefono" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><i class="bi bi-envelope-at me-2"></i>Correo Electrónico</label>
                                    <input type="email" class="form-control input-custom" id="edit-correo" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><i class="bi bi-cash-stack me-2"></i>Sueldo</label>
                                    <input type="number" step="0.01" class="form-control input-custom" id="edit-sueldo" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-key me-2"></i>Contraseña</label>
                                <input type="password" class="form-control input-custom" id="edit-password" placeholder="Dejar en blanco para no modificar">
                            </div>

                            <div class="d-flex flex-column flex-sm-row gap-3 pt-3 border-top border-secondary mt-3">
                                <button type="submit" class="btn btn-update w-100 py-2 text-uppercase">
                                    <i class="bi bi-floppy-fill me-2"></i>Actualizar Datos
                                </button>
                                <a href="indexPersonal.html" class="btn btn-cancel w-100 py-2 fw-bold text-decoration-none text-center">
                                    <i class="bi bi-x-circle me-2"></i>Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/perfilPersonal.js"></script>
    <script src="/js/perfilPersonalUpdate.js"></script>
</body>
</html>
