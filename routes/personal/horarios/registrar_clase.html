<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODY XTREME - Nueva Clase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/estilos.css">

  <style>
    body, html {
      margin: 0;
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      color: #fff;
      background-color: #000;
    }
    .fondo {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden;
    }
    .fondo img { width: 100%; height: 100%; object-fit: cover; opacity: 0.25; }
    .overlay { min-height: 100vh; background: rgba(0, 0, 0, 0.6); }

    /* Estilo del Formulario Dark Mode */
    .card-custom-form {
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(10px);
      border: 2px solid #00ff88; 
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.9);
    }
    .form-label {
      color: #00ff88;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }
    .input-custom {
      background-color: rgba(20, 20, 20, 0.8) !important;
      border: 1px solid rgba(255, 255, 255, 0.15) !important;
      color: #fff !important;
    }
    .input-custom:focus {
      border-color: #00ff88 !important;
      box-shadow: 0 0 8px rgba(0, 255, 136, 0.3) !important;
    }
    .btn-save {
      background: #00ff88; color: #000; border: none; font-weight: 700; transition: all 0.3s ease;
    }
    .btn-save:hover {
      background: #00cc6a; box-shadow: 0 0 15px rgba(0, 255, 136, 0.5); color: #000;
    }
  </style>
</head>
<body>

  <div class="fondo">
    <img src="/images/fondoPersonal.png" alt="Fondo Gimnasio">
  </div>

  <div class="overlay d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

          <div id="alert-container"></div>

          <div class="card-custom-form">
            <div class="text-center mb-4 border-bottom pb-3 border-secondary border-opacity-50">
              <h3 class="fw-bold m-0 text-white text-uppercase">
                Creación de <span style="color: #00ff88;">Clase</span>
              </h3>
              <p class="text-white-50 small m-0 mt-1">Añade una nueva especialidad o disciplina al catálogo</p>
            </div>

            <form id="form-crear-clase">

              <div class="mb-4">
                <label for="nombre" class="form-label text-uppercase">Nombre de la Clase</label>
                <input type="text" id="nombre" class="form-control input-custom" placeholder="Ej: CrossFit, Zumba, Spinning" required maxlength="100">
              </div>

              <div class="mb-4">
                <label for="cupo_maximo" class="form-label text-uppercase">Cupo Máximo de Alumnos</label>
                <input type="number" id="cupo_maximo" class="form-control input-custom" placeholder="Ej: 30" required min="1" step="1">
              </div>

              <div class="mb-5">
                <label for="descripcion" class="form-label text-uppercase">Descripción de la Disciplina</label>
                <textarea id="descripcion" class="form-control input-custom" rows="4" placeholder="Describe brevemente el enfoque del entrenamiento..." required></textarea>
              </div>

              <div class="d-flex justify-content-between gap-3 border-top border-secondary border-opacity-50 pt-3">
                <button type="submit" id="btn-guardar" class="btn btn-save px-4 py-2 text-uppercase w-100">
                  Guardar Clase
                </button>
                <a href="/routes/personal/horarios/horarioclaseList.html" class="btn btn-outline-danger px-4 py-2 fw-bold text-white text-decoration-none text-center w-50">
                  Cancelar
                </a>
              </div>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const API_CLASES_URL = "http://127.0.0.1:8000/api/personal/clases";

    const token = localStorage.getItem('toke_usuario');
    const rol = localStorage.getItem('usuario_rol');

    const formClase = document.getElementById('form-crear-clase');
    const btnGuardar = document.getElementById('btn-guardar');
    const alertContainer = document.getElementById('alert-container');

    // Validación de sesión remota y rol de Personal/Administrador
    if (!token || (rol !== 'personal' && rol !== 'Administrador')) {
        window.location.href = "login.html";
    }

    function getAuthHeaders() {
        return {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'Authorization': `Bearer ${token}`
        };
    }

    // POST: Guardar la nueva clase armada
    formClase.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Bloquear botón para evitar doble submit
        btnGuardar.disabled = true;
        btnGuardar.textContent = "Procesando Registro...";

        // Estructuración exacta del payload solicitado por tu API
        const payloadClase = {
            "Nombre": document.getElementById('nombre').value.trim(),
            "Descripción": document.getElementById('descripcion').value.trim(),
            "Cupo_Maximo": parseInt(document.getElementById('cupo_maximo').value)
        };

        try {
            const response = await fetch(API_CLASES_URL, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(payloadClase)
            });

            const jsonResponse = await response.json().catch(() => ({}));

            if (response.ok || response.status === 201) {
                mostrarAlerta("¡La clase ha sido dada de alta exitosamente!", "success");
                
                // Redirección al panel principal de Clases y Horarios
                setTimeout(() => {
                    window.location.href = "/routes/personal/horarios/horarioclaseList.html";
                }, 1800);
            } else {
                let msgError = jsonResponse.message || "Error al procesar la inserción de la clase.";
                // Si Laravel devuelve errores de validación estructurados
                if (jsonResponse.errors) {
                    msgError = Object.values(jsonResponse.errors).flat().join("<br>");
                }
                throw new Error(msgError);
            }
        } catch (error) {
            console.error(error);
            mostrarAlerta(`⚠️ Error en la transacción: ${error.message}`, "danger");
            
            // Reactivar controles en caso de falla
            btnGuardar.disabled = false;
            btnGuardar.textContent = "Guardar Clase";
        }
    });

    function mostrarAlerta(mensaje, tipo) {
        alertContainer.innerHTML = `
            <div class="alert alert-${tipo} alert-dismissible fade show fw-bold text-center" role="alert">
                <div>${mensaje}</div>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        `;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
