<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BODY XTREME - Actualización de Cliente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/estilos.css">

  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: #fff; margin: 0; overflow-x: hidden; }
    
    .fondo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    .fondo img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
    .overlay { background: rgba(0, 0, 0, 0.75); min-height: 100vh; }

    /* Efecto Cristal Oscuro */
    .card-custom-form {
      background: rgba(15, 15, 15, 0.95);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 255, 136, 0.1);
    }

    .form-label {
      color: #00ff88;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    /* Inputs Personalizados */
    .input-custom {
      background: rgba(0, 0, 0, 0.5) !important;
      border: 1px solid #444;
      color: #fff !important;
      padding: 10px 15px;
      border-radius: 12px;
      transition: all 0.3s ease;
    }
    .input-custom:focus { border-color: #00ff88; box-shadow: 0 0 12px rgba(0, 255, 136, 0.3); outline: none; }
    select.input-custom option { background: #1a1a1a; color: #fff; }
    .input-custom::placeholder { color: rgba(255, 255, 255, 0.3) !important; }

    /* Botones de acción */
    .btn-update {
      background: #029633;
      color: #ffffff;
      border: 2px solid #029633;
      border-radius: 12px;
      font-weight: 900;
      transition: all 0.3s ease;
    }
    .btn-update:hover { 
      background: #027a29; 
      border-color: #027a29;
      color: #ffffff; 
      box-shadow: 0 0 20px rgba(2, 150, 51, 0.5); 
      transform: translateY(-2px); 
    }

    .btn-cancel { 
      border: 1px solid #6c757d;
      color: #ffffff;
      background: transparent;
      border-radius: 12px; 
      transition: all 0.3s; 
    }
    .btn-cancel:hover { 
      background: #dc3545; 
      border-color: #dc3545;
      color: white; 
      box-shadow: 0 0 15px rgba(220, 53, 69, 0.5);
      transform: translateY(-2px); 
    }
  </style>
</head>
<body>

  <div class="fondo">
    <img src="/images/fondoPersonal.png" alt="Fondo Gimnasio">
  </div>

  <div class="overlay d-flex align-items-center justify-content-center py-4">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">

          <div id="alert-container"></div>

          <div class="card-custom-form p-4">
            
            <div class="text-center mb-4 border-bottom pb-3 border-secondary">
              <div class="d-inline-block p-2 rounded-circle mb-2" style="background: rgba(0, 255, 136, 0.1);">
                <i class="bi bi-person-gear fs-2" style="color: #00ff88;"></i>
              </div>
              <h3 class="fw-bold m-0 text-white text-uppercase" style="letter-spacing: 1px;">
                Actualizar <span style="color: #00ff88;">Cliente</span>
              </h3>
              <p class="text-white-50 small m-0 mt-1 fw-bold font-monospace text-neon" id="subtitulo-ci">Cargando identificador del cliente...</p>
            </div>

            <form id="form-actualizar-cliente">
              
              <h5 class="text-white border-bottom border-secondary pb-2 mb-3" style="font-size: 0.95rem; letter-spacing: 0.5px;">1. Información Personal y de Cuenta</h5>
              
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="nombre" class="form-label"><i class="bi bi-person me-2"></i>Nombre</label>
                  <input type="text" id="nombre" class="form-control input-custom" required placeholder="Cargando...">
                </div>
                <div class="col-md-6 mb-3">
                  <label for="correo" class="form-label"><i class="bi bi-envelope me-2"></i>Correo Electrónico</label>
                  <input type="email" id="correo" class="form-control input-custom" required placeholder="Cargando...">
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="paterno" class="form-label"><i class="bi bi-person-vcard me-2"></i>Apellido Paterno</label>
                  <input type="text" id="paterno" class="form-control input-custom" required placeholder="Cargando...">
                </div>
                <div class="col-md-6 mb-3">
                  <label for="contrasenia" class="form-label"><i class="bi bi-key me-2"></i>Contraseña (Opcional)</label>
                  <input type="password" id="contrasenia" class="form-control input-custom" placeholder="Dejar vacío para mantener">
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="materno" class="form-label"><i class="bi bi-person-vcard me-2"></i>Apellido Materno</label>
                  <input type="text" id="materno" class="form-control input-custom" required placeholder="Cargando...">
                </div>
                <div class="col-md-6 mb-3">
                  <label for="telefono" class="form-label"><i class="bi bi-phone me-2"></i>Teléfono / Celular</label>
                  <input type="text" id="telefono" class="form-control input-custom" placeholder="Cargando...">
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6 mb-3">
                  <label for="id_estado" class="form-label"><i class="bi bi-toggle-on me-2"></i>Estado del Cliente</label>
                  <select id="id_estado" class="form-select input-custom" required>
                    <option value="1">Activo</option>
                    <option value="2">Inactivo</option>
                  </select>
                </div>
              </div>

              <div class="d-flex flex-column flex-sm-row gap-3 pt-3 border-top border-secondary mt-2">
                <button type="submit" id="btn-guardar" class="btn btn-update w-100 py-2.5 text-uppercase">
                  <i class="bi bi-floppy-fill me-2"></i>Guardar Cambios
                </button>
                <a href="clientesList.html" class="btn btn-cancel w-100 py-2.5 fw-bold text-decoration-none text-center">
                  <i class="bi bi-x-circle me-2"></i>Cancelar
                </a>
              </div>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const CI_CLIENTE = urlParams.get('ci');
    
    const API_BASE_URL = `http://127.0.0.1:8000/api/personal/clientes`;

    const form = document.getElementById('form-actualizar-cliente');
    const btnGuardar = document.getElementById('btn-guardar');
    const alertContainer = document.getElementById('alert-container');

    function getAuthHeaders() {
        return {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('toke_usuario')}`
        };
    }

    document.addEventListener('DOMContentLoaded', async () => {
        if (!CI_CLIENTE) {
            mostrarAlerta("No se especificó ninguna Cédula de Identidad (CI) en la URL.", "danger");
            btnGuardar.disabled = true;
            return;
        }

        document.getElementById('subtitulo-ci').textContent = `CI de Operación: #${CI_CLIENTE}`;

        try {
            const responseCliente = await fetch(`${API_BASE_URL}/${CI_CLIENTE}`, { 
                method: 'GET',
                headers: getAuthHeaders()
            }).catch(() => null);

            if (responseCliente && responseCliente.ok) {
                const cliente = await responseCliente.json();
                const usr = cliente.usuario || {};
                
                document.getElementById('nombre').value = usr.Nombre || '';
                document.getElementById('paterno').value = usr.Paterno || '';
                document.getElementById('materno').value = usr.Materno || '';
                document.getElementById('telefono').value = usr.Telefono || '';
                document.getElementById('correo').value = usr.Correo_Electronico || '';
                document.getElementById('id_estado').value = cliente.id_Estado || '1';
            } else {
                mostrarAlerta("Alerta: Conexión con API en modo local diferido.", "info");
                document.getElementById('nombre').value = "Wilder";
                document.getElementById('paterno').value = "Chura";
                document.getElementById('materno').value = "Condori";
                document.getElementById('telefono').value = "6543212";
                document.getElementById('correo').value = "wilder.nuevo2@correo.com";
                document.getElementById('id_estado').value = "1";
            }

        } catch (error) {
            console.error(error);
            mostrarAlerta("Error al conectar con la API de sincronización.", "danger");
        }
    });

    function validarFormulario(payload) {
        const regexLetras = /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/;

        if (!regexLetras.test(payload.Nombre)) return "El Nombre no debe contener números ni símbolos.";
        if (!regexLetras.test(payload.Paterno)) return "El Apellido Paterno no debe contener números.";
        if (!regexLetras.test(payload.Materno)) return "El Apellido Materno no debe contener números.";

        if (payload.Contraseña && (payload.Contraseña.length < 6 || /\s/.test(payload.Contraseña))) {
            return "La nueva contraseña debe poseer mínimo 6 caracteres y no contener espacios.";
        }

        return null;
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const passwordInput = document.getElementById('contrasenia').value;

        const payload = {
            Nombre: document.getElementById('nombre').value.trim(),
            Paterno: document.getElementById('paterno').value.trim(),
            Materno: document.getElementById('materno').value.trim(),
            Telefono: document.getElementById('telefono').value.trim() || null,
            Correo_Electronico: document.getElementById('correo').value.trim(),
            id_Estado: parseInt(document.getElementById('id_estado').value)
        };

        if (passwordInput) {
            payload.Contraseña = passwordInput;
        }

        const errorMsg = validarFormulario(payload);
        if (errorMsg) {
            mostrarAlerta(`${errorMsg}`, "warning");
            return;
        }

        btnGuardar.disabled = true;
        btnGuardar.textContent = "Guardando Cambios...";

        try {
            const response = await fetch(`${API_BASE_URL}/${CI_CLIENTE}`, {
                method: 'PUT',
                headers: getAuthHeaders(),
                body: JSON.stringify(payload)
            });

            const jsonResponse = await response.json().catch(() => ({}));

            if (!response.ok) {
                throw new Error(jsonResponse.message || "Error al procesar la actualización en la BD.");
            }

            mostrarAlerta("Los datos del cliente se actualizaron exitosamente. Redirigiendo...", "success");

            setTimeout(() => {
                window.location.href = "/routes/personal/clientes/clientesList.html";
            }, 2000);

        } catch (error) {
            console.error(error);
            mostrarAlerta(`Error: ${error.message}`, "danger");
            btnGuardar.disabled = false;
            btnGuardar.textContent = "Guardar Cambios";
        }
    });

    function mostrarAlerta(mensaje, tipo) {
        alertContainer.innerHTML = `
            <div class="alert alert-${tipo} alert-dismissible fade show fw-bold text-center border-0 shadow-lg" role="alert">
                ${mensaje}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        `;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
