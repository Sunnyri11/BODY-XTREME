<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODY XTREME - Actualizar Datos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">

    <style>
        body { font-family: 'Montserrat', sans-serif; }
        
        .fondo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .fondo img { width: 100%; height: 100%; object-fit: cover; }
        .overlay { background: rgba(0, 0, 0, 0.75); min-height: 100vh; }

        /* Efecto Cristal (Glassmorphism) para el formulario */
        .card-custom-form {
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.1);
        }

        .form-label {
            color: #00ff88;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Estilos de Inputs para Modo Oscuro */
        .input-custom {
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid #444;
            color: #fff !important;
            padding: 12px 15px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .input-custom::placeholder { color: rgba(255,255,255,0.3) !important; }
        .input-custom:focus {
            border-color: #00ff88;
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.3);
            outline: none;
        }
        
        /* Ajuste específico para el Select en dark mode */
        select.input-custom option { background: #1a1a1a; color: #fff; }

        /* Botón Neón */
        .btn-neon {
            background: transparent;
            color: #00ff88;
            border: 2px solid #00ff88;
            border-radius: 12px;
            font-weight: 900;
            transition: all 0.3s ease;
        }
        .btn-neon:hover {
            background: #00ff88;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            transform: translateY(-2px);
        }
        .btn-outline-secondary:hover { 
            background: #dc3545; 
            border-color: #dc3545;
            color: white; 
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.5);
            transform: translateY(-2px); 
        }
        .btn-outline-secondary { border-radius: 12px; transition: all 0.3s; }
    </style>
</head>

<body>

    <div class="fondo">
        <img src="/images/fondoentrenadores.png" alt="Fondo Gimnasio">
    </div>

    <div class="overlay d-flex align-items-center justify-content-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8 col-xl-7">

                    <div id="alert-container"></div>

                    <div class="card-custom-form p-4 p-md-5">
                        <div class="text-center mb-4 border-bottom pb-4 border-secondary">
                            <div class="d-inline-block p-3 rounded-circle mb-3" style="background: rgba(0, 255, 136, 0.1);">
                                <i class="bi bi-person-gear fs-1" style="color: #00ff88;"></i>
                            </div>
                            <h3 class="fw-bold m-0 text-uppercase" style="color: #ffffff; letter-spacing: 1px;">
                                Actualizar <span style="color: #00ff88;">Mis Datos</span>
                            </h3>
                            <p class="text-white-50 small m-0 mt-2">Mantén tu información profesional y de contacto al día</p>
                        </div>

                        <form id="form-actualizar-entrenador">
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="nombre" class="form-label"><i class="bi bi-person me-2"></i>Nombre</label>
                                    <input type="text" id="nombre" class="form-control input-custom" required placeholder="Tu nombre">
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label for="paterno" class="form-label"><i class="bi bi-person-lines-fill me-2"></i>Apellido Paterno</label>
                                    <input type="text" id="paterno" class="form-control input-custom" required placeholder="Tu primer apellido">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="materno" class="form-label"><i class="bi bi-person-lines-fill me-2"></i>Apellido Materno</label>
                                    <input type="text" id="materno" class="form-control input-custom" placeholder="Tu segundo apellido">
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label for="telefono" class="form-label"><i class="bi bi-phone me-2"></i>Teléfono</label>
                                    <input type="text" id="telefono" class="form-control input-custom" required placeholder="Ej: 71234567">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="correo" class="form-label"><i class="bi bi-envelope-at me-2"></i>Correo Electrónico</label>
                                <input type="email" id="correo" class="form-control input-custom" required placeholder="ejemplo@gym.com">
                            </div>

                            <div class="mb-5">
                                <label for="id_especialidad" class="form-label"><i class="bi bi-star me-2"></i>Especialidad</label>
                                <select id="id_especialidad" class="form-select input-custom" required>
                                    <option value="" disabled selected>Cargando especialidades...</option>
                                </select>
                            </div>

                            <div class="d-flex flex-column flex-sm-row gap-3 pt-4 border-top border-secondary">
                                <button type="submit" id="btn-guardar" class="btn btn-neon w-100 py-3 text-uppercase">
                                    <i class="bi bi-floppy-fill me-2"></i>Guardar Cambios
                                </button>
                                <a href="indexEntrenador.html" class="btn btn-outline-secondary w-100 py-3 fw-bold text-white text-decoration-none text-center">
                                    <i class="bi bi-x-circle me-2"></i>Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/perfilEntrenadorUpdate.js"></script>
</body>

</html>
